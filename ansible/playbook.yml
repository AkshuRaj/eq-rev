- name: Deploy DevOps App
  hosts: localhost
  become: yes

  vars:
    image_name: "{{ lookup('env', 'IMAGE_NAME') }}"
    container_name: devops-app

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present

    - name: Pull latest image
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        state: started
        restart_policy: always
        ports:
          - "5000:5000"
